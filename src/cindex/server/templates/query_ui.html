<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cindex UI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #7dd3fc; margin-bottom: 1.5rem; letter-spacing: .05em; }
  .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
  .tab-btn {
    padding: .45rem 1.2rem; border: 1px solid #334155; background: #1e293b;
    color: #94a3b8; border-radius: .4rem; cursor: pointer; font-size: .9rem; transition: all .15s;
  }
  .tab-btn.active { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: .6rem; padding: 1.25rem; max-width: 860px; }
  label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: .3rem; margin-top: .9rem; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=number], textarea {
    width: 100%; padding: .5rem .75rem; background: #0f1117; border: 1px solid #334155;
    border-radius: .4rem; color: #e2e8f0; font-size: .9rem; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, monospace; font-size: .85rem; }
  input:focus, textarea:focus { outline: 2px solid #0ea5e9; outline-offset: 0; }
  .row { display: flex; gap: .75rem; }
  .row > div { flex: 1; }
  .meta { margin-bottom: 1rem; font-size: .85rem; color: #94a3b8; }
  .meta code { color: #e2e8f0; }
  button.submit {
    margin-top: 1rem; padding: .55rem 1.5rem; background: #0ea5e9; border: none;
    border-radius: .4rem; color: #fff; font-size: .9rem; cursor: pointer; transition: background .15s;
  }
  button.submit:hover { background: #38bdf8; }
  button.submit:disabled { background: #334155; color: #64748b; cursor: default; }
  .error { margin-top: .75rem; padding: .6rem .9rem; background: #450a0a; border: 1px solid #991b1b; border-radius: .4rem; font-size: .85rem; color: #fca5a5; display: none; }
  .result-meta { margin-top: .9rem; font-size: .8rem; color: #64748b; }
  .table-wrap { overflow-x: auto; margin-top: .6rem; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { background: #0f1117; color: #7dd3fc; text-align: left; padding: .45rem .7rem; border-bottom: 1px solid #334155; white-space: nowrap; }
  td { padding: .4rem .7rem; border-bottom: 1px solid #1e293b; color: #cbd5e1; word-break: break-all; }
  tr:hover td { background: #172033; }
  .empty { color: #475569; font-size: .85rem; margin-top: .6rem; }
  .viz-controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .75rem; margin-top: .9rem; }
  .viz-controls .full { grid-column: 1 / -1; }
  .hint { margin-top: .4rem; color: #64748b; font-size: .78rem; }
  .viz-stage { margin-top: 1rem; border: 1px solid #334155; border-radius: .5rem; overflow: hidden; background: #0b1220; }
  #viz-svg { width: 100%; height: 520px; display: block; }
  .legend { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .65rem; font-size: .78rem; color: #94a3b8; }
  .pill { border: 1px solid #334155; padding: .15rem .45rem; border-radius: 999px; }
  @media (max-width: 860px) {
    .viz-controls { grid-template-columns: 1fr; }
    #viz-svg { height: 420px; }
  }
</style>
</head>
<body>
<h1>cindex</h1>
<p class="meta">Configured SQLite database: <code>{{SQLITE_DB}}</code></p>
<p class="meta">Configured embedding model: <code>{{DEFAULT_MODEL}}</code></p>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('sql', this)">SQL Query</button>
  <button class="tab-btn" onclick="switchTab('sim', this)">Semantic Search</button>
  <button class="tab-btn" onclick="switchTab('viz', this)">Visualize</button>
</div>

<div id="panel-sql" class="panel active">
  <div class="card">
    <label for="sql-query">SQL</label>
    <textarea id="sql-query" rows="4" placeholder="SELECT * FROM vertices LIMIT 20"></textarea>
    <button class="submit" id="sql-btn" onclick="runSql()">Run</button>
    <div class="error" id="sql-err"></div>
    <div id="sql-results"></div>
  </div>
</div>

<div id="panel-sim" class="panel">
  <div class="card">
    <label for="sim-text">Query text</label>
    <input type="text" id="sim-text" placeholder="function that parses arguments">
    <div class="row">
      <div>
        <label for="sim-label">Label filter</label>
        <input type="text" id="sim-label" placeholder="function / class / module">
      </div>
      <div>
        <label for="sim-k">Top-k</label>
        <input type="number" id="sim-k" value="10" min="1" max="100" style="width:80px">
      </div>
    </div>
    <button class="submit" id="sim-btn" onclick="runSim()">Search</button>
    <div class="error" id="sim-err"></div>
    <div id="sim-results"></div>
  </div>
</div>

<div id="panel-viz" class="panel">
  <div class="card">
    <label>1) Find a seed vertex</label>
    <div class="viz-controls">
      <div>
        <label for="viz-name">Name contains</label>
        <input type="text" id="viz-name" placeholder="e.g. create_app">
      </div>
      <div>
        <label for="viz-label">Label</label>
        <input type="text" id="viz-label" placeholder="function / class / module / external">
      </div>
      <div class="full">
        <label for="viz-path">Path contains</label>
        <input type="text" id="viz-path" placeholder="e.g. server/app.py">
      </div>
      <div>
        <label for="viz-limit">Result limit</label>
        <input type="number" id="viz-limit" value="30" min="1" max="200" style="width: 110px;">
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="submit" id="viz-search-btn" onclick="searchVizVertices()">Search Vertices</button>
      </div>
      <div class="full">
        <label for="viz-seed">Seed vertex</label>
        <select id="viz-seed" style="width:100%; padding:.5rem .75rem; background:#0f1117; border:1px solid #334155; border-radius:.4rem; color:#e2e8f0; font-size:.9rem;">
          <option value="">Search first...</option>
        </select>
      </div>
    </div>

    <label style="margin-top:1rem;">2) Traverse and render</label>
    <div class="viz-controls">
      <div>
        <label for="viz-direction">Direction</label>
        <select id="viz-direction" style="width:100%; padding:.5rem .75rem; background:#0f1117; border:1px solid #334155; border-radius:.4rem; color:#e2e8f0; font-size:.9rem;">
          <option value="both" selected>both</option>
          <option value="out">out</option>
          <option value="in">in</option>
        </select>
      </div>
      <div>
        <label for="viz-depth">Depth</label>
        <input type="number" id="viz-depth" value="1" min="1" max="5" style="width: 110px;">
      </div>
      <div>
        <label for="viz-max">Max vertices</label>
        <input type="number" id="viz-max" value="80" min="1" max="500" style="width: 110px;">
      </div>
      <div>
        <label for="viz-edges">Edge labels (comma-separated)</label>
        <input type="text" id="viz-edges" placeholder="defines, imports, has_method">
      </div>
      <div class="full">
        <button class="submit" id="viz-render-btn" onclick="renderVizGraph()">Render Neighborhood</button>
        <div class="hint">Tip: Click any node in the graph to re-center on it and render its neighborhood.</div>
      </div>
    </div>

    <div class="error" id="viz-err"></div>
    <div id="viz-results" class="result-meta" style="margin-top:.9rem;"></div>
    <div class="legend" id="viz-legend"></div>
    <div class="viz-stage">
      <svg id="viz-svg" viewBox="0 0 900 520" aria-label="Graph visualization"></svg>
    </div>
  </div>
</div>

<script>
function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
}

function renderTable(containerId, metaHtml, columns, rows) {
  const container = document.getElementById(containerId);
  if (!rows.length) {
    container.innerHTML = '<p class="empty">No results.</p>';
    return;
  }

  const header = columns.map(c => `<th>${esc(c)}</th>`).join('');
  const body = rows.map(r => {
    const cells = Array.isArray(r)
      ? r.map(v => `<td>${esc(v)}</td>`).join('')
      : columns.map(c => `<td>${esc(r[c])}</td>`).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  container.innerHTML = `<div class="result-meta">${metaHtml}</div>
    <div class="table-wrap"><table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function esc(v) {
  if (v == null) return '<span style="color:#475569">null</span>';
  return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escAttr(v) {
  if (v == null) return '';
  return String(v).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function nodeColor(label, isCenter) {
  if (isCenter) return '#fde047';
  if (label === 'module') return '#7dd3fc';
  if (label === 'function') return '#34d399';
  if (label === 'class') return '#f59e0b';
  if (label === 'external') return '#f472b6';
  return '#cbd5e1';
}

function shortPath(path) {
  if (!path) return '';
  const parts = String(path).split(/[/\\]/);
  return parts.slice(-2).join('/');
}

let vizVertexRows = [];
let vizGraphState = null;

async function searchVizVertices() {
  clearError('viz-err');
  const payload = {
    name: document.getElementById('viz-name').value.trim() || null,
    label: document.getElementById('viz-label').value.trim() || null,
    path_contains: document.getElementById('viz-path').value.trim() || null,
    limit: parseInt(document.getElementById('viz-limit').value, 10),
  };

  const btn = document.getElementById('viz-search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  try {
    const res = await fetch('/graph/vertices', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      showError('viz-err', data.detail ?? JSON.stringify(data));
      return;
    }

    vizVertexRows = data.rows || [];
    const select = document.getElementById('viz-seed');
    select.innerHTML = '';
    if (!vizVertexRows.length) {
      select.innerHTML = '<option value="">No matches</option>';
    } else {
      for (const row of vizVertexRows) {
        const opt = document.createElement('option');
        opt.value = row.vertex_id;
        opt.textContent = `${row.label}: ${row.name || row.vertex_id} (${shortPath(row.path)}${row.line ? ':' + row.line : ''})`;
        select.appendChild(opt);
      }
    }
    document.getElementById('viz-results').innerHTML = `${data.count} seed candidate(s)`;
  } catch (e) {
    showError('viz-err', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search Vertices';
  }
}

async function renderVizGraph(vertexId = null) {
  clearError('viz-err');
  const seedId = vertexId || document.getElementById('viz-seed').value;
  if (!seedId) {
    showError('viz-err', 'Select a seed vertex first.');
    return;
  }

  const edgeLabelsRaw = document.getElementById('viz-edges').value.trim();
  const edgeLabels = edgeLabelsRaw
    ? edgeLabelsRaw.split(',').map(s => s.trim()).filter(Boolean)
    : null;

  const payload = {
    vertex_id: seedId,
    direction: document.getElementById('viz-direction').value,
    depth: parseInt(document.getElementById('viz-depth').value, 10),
    max_vertices: parseInt(document.getElementById('viz-max').value, 10),
    edge_labels: edgeLabels,
  };

  const btn = document.getElementById('viz-render-btn');
  btn.disabled = true;
  btn.textContent = 'Rendering...';
  try {
    const res = await fetch('/graph/traverse', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      showError('viz-err', data.detail ?? JSON.stringify(data));
      return;
    }

    vizGraphState = data;
    drawVizGraph(data);
    document.getElementById('viz-results').innerHTML = `${data.vertices.length} vertex(es), ${data.edges.length} edge(s), depth ${data.depth}`;
  } catch (e) {
    showError('viz-err', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Render Neighborhood';
  }
}

function drawVizGraph(data) {
  const svg = document.getElementById('viz-svg');
  const width = 900;
  const height = 520;
  const cx = width / 2;
  const cy = height / 2;
  const centerId = data.center_vertex_id;
  const vertices = data.vertices || [];
  const edges = data.edges || [];

  if (!vertices.length) {
    svg.innerHTML = '<text x="20" y="32" fill="#94a3b8" font-size="14">No vertices to render.</text>';
    return;
  }

  const center = vertices.find(v => v.vertex_id === centerId) || vertices[0];
  const others = vertices.filter(v => v.vertex_id !== center.vertex_id);
  const positions = new Map();
  positions.set(center.vertex_id, {x: cx, y: cy});

  if (others.length) {
    const radius = Math.min(width, height) * 0.38;
    others.forEach((v, i) => {
      const theta = (Math.PI * 2 * i) / others.length;
      positions.set(v.vertex_id, {
        x: cx + radius * Math.cos(theta),
        y: cy + radius * Math.sin(theta),
      });
    });
  }

  const edgeBits = edges.map(e => {
    const a = positions.get(e.out_v_id);
    const b = positions.get(e.in_v_id);
    if (!a || !b) return '';
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    return `
      <line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#334155" stroke-width="1.5" />
      <text x="${mx}" y="${my - 4}" fill="#64748b" font-size="10" text-anchor="middle">${esc(e.label)}</text>
    `;
  }).join('');

  const nodeBits = vertices.map(v => {
    const p = positions.get(v.vertex_id);
    const isCenter = v.vertex_id === center.vertex_id;
    const fill = nodeColor(v.label, isCenter);
    const title = `${v.label} ${v.name || v.vertex_id}\n${v.path || ''}${v.line ? ':' + v.line : ''}`;
    return `
      <g class="viz-node" data-vertex-id="${escAttr(v.vertex_id)}" style="cursor:pointer;">
        <circle cx="${p.x}" cy="${p.y}" r="${isCenter ? 13 : 9}" fill="${fill}" stroke="#0f172a" stroke-width="2"></circle>
        <title>${esc(title)}</title>
        <text x="${p.x}" y="${p.y + (isCenter ? 28 : 22)}" fill="#cbd5e1" font-size="11" text-anchor="middle">${esc(v.name || v.vertex_id.slice(0, 8))}</text>
      </g>
    `;
  }).join('');

  svg.innerHTML = `
    <rect x="0" y="0" width="${width}" height="${height}" fill="#0b1220"></rect>
    ${edgeBits}
    ${nodeBits}
  `;

  svg.querySelectorAll('.viz-node').forEach(el => {
    el.addEventListener('click', () => {
      const clickedId = el.getAttribute('data-vertex-id');
      if (clickedId) {
        renderVizGraph(clickedId);
      }
    });
  });

  const labels = Array.from(new Set(vertices.map(v => v.label))).sort();
  document.getElementById('viz-legend').innerHTML = labels
    .map(label => `<span class="pill" style="border-color:${nodeColor(label, false)}">${esc(label)}</span>`)
    .join('');
}

async function runSql() {
  clearError('sql-err');
  const sql = document.getElementById('sql-query').value.trim();
  if (!sql) {
    showError('sql-err', 'SQL is required.');
    return;
  }

  const btn = document.getElementById('sql-btn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  try {
    const res = await fetch('/query/sql', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sql})
    });
    const data = await res.json();
    if (!res.ok) {
      showError('sql-err', data.detail ?? JSON.stringify(data));
      return;
    }
    renderTable('sql-results', `${data.rows.length} row(s)`, data.columns, data.rows);
  } catch (e) {
    showError('sql-err', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run';
  }
}

async function runSim() {
  clearError('sim-err');
  const text = document.getElementById('sim-text').value.trim();
  const label = document.getElementById('sim-label').value.trim() || null;
  const k = parseInt(document.getElementById('sim-k').value, 10);
  if (!text) {
    showError('sim-err', 'Query text is required.');
    return;
  }

  const btn = document.getElementById('sim-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  try {
    const res = await fetch('/query/similar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, k, label})
    });
    const data = await res.json();
    if (!res.ok) {
      showError('sim-err', data.detail ?? JSON.stringify(data));
      return;
    }
    const cols = data.rows.length ? Object.keys(data.rows[0]) : [];
    const rowArrays = data.rows.map(r => cols.map(c => r[c]));
    renderTable('sim-results', `${data.count} result(s)`, cols, rowArrays);
  } catch (e) {
    showError('sim-err', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}
</script>
</body>
</html>
